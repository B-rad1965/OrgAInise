kind = "web"
previewPath = "/"
title = "OrgAInise"
version = "1.0.0"
id = "artifacts/orgainise"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25292

[services.development]
run = "pnpm --filter @workspace/orgainise run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/orgainise", "run", "build" ]
publicDir = "artifacts/orgainise/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25292"
BASE_PATH = "/"
